<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="/src/index.css" />
    <style>
      body {
        width: 340px;
        margin: 0;
        font-family: sans-serif;
      }
    </style>
  </head>
  <body class="bg-slate-50 text-slate-800">
    <div class="bg-[#1e40af] flex items-center p-3 text-white shadow-md rounded-b-xl mb-4 mx-2 mt-[-4px]">
      <svg class="w-5 h-5 mr-2 opacity-90" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
      <div class="flex-1">
          <h1 class="text-sm font-bold tracking-wide">Trợ lý Nhận xét Pro</h1>
      </div>
      <div>
        <svg id="settingsBtn" class="w-4 h-4 opacity-70 cursor-pointer hover:opacity-100 transition-opacity" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
        </svg>
      </div>
    </div>
    
    <div class="px-5 pb-5 space-y-4">
      <div class="bg-green-50 border border-green-200 text-green-700 p-3 rounded-lg flex items-center justify-center gap-2">
         <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
         <span class="text-[13px] font-bold">Đã kích hoạt bản quyền</span>
      </div>
      
      <p class="text-xs text-slate-600 leading-relaxed text-center px-2">
        Hãy chọn đúng Môn học và Lớp trên trang, sau đó bấm nút dưới đây để công cụ quét và tự động điền.
      </p>

      <button id="runBtn" class="w-full bg-[#1e40af] hover:bg-blue-800 text-white font-bold py-3.5 px-4 rounded-full shadow-lg shadow-blue-200 transition-all cursor-pointer flex justify-center items-center gap-2 active:scale-95">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
        CHẠY TỰ ĐỘNG ĐIỀN
      </button>

      <div class="flex flex-col gap-2 pt-2">
      </div>
      
      <div class="flex justify-between items-center text-xs pt-1 border-t border-slate-200 mt-4">
         <button id="optionsBtn" class="text-blue-600 hover:text-blue-800 font-medium hover:underline cursor-pointer">Sửa mẫu nhận xét</button>
         <span class="text-slate-400">Tài khoản: GV</span>
      </div>

    </div>
    
    <div id="statusArea" class="hidden bg-slate-100 p-2 border-t border-slate-200 flex items-center justify-center gap-1.5 text-xs">
      <div id="statusDot" class="w-2 h-2 rounded-full bg-slate-300"></div>
      <span id="statusText" class="font-medium text-slate-500">Đang chờ lệnh...</span>
    </div>

    <script type="module" src="/popup.js"></script>
  </body>
</html>
